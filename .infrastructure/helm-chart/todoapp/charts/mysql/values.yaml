namespace: mysql

image:
  repository: mysql
  tag: "8.0"

replicas: 2

pvc:
  storage: 2Gi

nodeAffinity:
  key: app
  values:
    - mysql

tolerations:
  - key: "app"
    operator: "Equal"
    value: "mysql"
    effect: "NoSchedule"

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "500m"
    memory: "1Gi"

secrets:
  MYSQL_ROOT_PASSWORD: "MTIzNA=="
  MYSQL_USER: "YXBwX3VzZXI="
  MYSQL_PASSWORD: "MTIzNA=="
